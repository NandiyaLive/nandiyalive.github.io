<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />

  <link rel="apple-touch-icon" href="%PUBLIC_URL%/flying-saucer.svg" />
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"> 
  <script src="https://kit.fontawesome.com/1dc379e3e7.js" crossorigin="anonymous "></script>

  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <title>Neranjana Prasad</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div class="preloader">
    <svg width="200" height="200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"
      preserveAspectRatio="xMidYMid" class="lds-ripple" style="background:0 0">
      <circle cx="50" cy="50" r="4" fill="none" stroke="#ffff00" stroke-width="2">
        <animate attributeName="r" calcMode="spline" values="0;40" keyTimes="0;1" dur="3" keySplines="0 0.2 0.8 1"
          begin="-1.5s" repeatCount="indefinite" />
        <animate attributeName="opacity" calcMode="spline" values="1;0" keyTimes="0;1" dur="3" keySplines="0.2 0 0.8 1"
          begin="-1.5s" repeatCount="indefinite" />
      </circle>
      <circle cx="50" cy="50" r="20" fill="none" stroke="#ffff00" stroke-width="2">
        <animate attributeName="r" calcMode="spline" values="0;40" keyTimes="0;1" dur="3" keySplines="0 0.2 0.8 1"
          begin="0s" repeatCount="indefinite" />
        <animate attributeName="opacity" calcMode="spline" values="1;0" keyTimes="0;1" dur="3" keySplines="0.2 0 0.8 1"
          begin="0s" repeatCount="indefinite" />
      </circle>
    </svg>
  </div>
  <main class="container">
  </main>
</body>

</html>
